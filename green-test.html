            }
            
            const q = questions[currentQuestion];
            document.getElementById('questionNum').textContent = '第 ' + (currentQuestion + 1) + ' 题 / 共 ' + totalQuestions + ' 题';
            document.getElementById('questionText').textContent = q.text;
            document.getElementById('progressFill').style.width = ((currentQuestion + 1) / totalQuestions * 100) + '%';
            
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            const options = quizData.options || [
                {value: 5, text: '非常同意'},
                {value: 4, text: '同意'},
                {value: 3, text: '一般'},
                {value: 2, text: '不同意'},
                {value: 1, text: '完全不感兴趣'}
            ];
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn' + (answers[currentQuestion] === opt.value ? ' selected' : '');
                btn.textContent = opt.text;
                btn.onclick = () => selectOption(opt.value, btn);
                container.appendChild(btn);
            });
            
            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            document.getElementById('nextBtn').disabled = answers[currentQuestion] === undefined;
            document.getElementById('nextBtn').textContent = currentQuestion === totalQuestions - 1 ? '查看结果' : '下一题';
        }
        
        function selectOption(value, btn) {
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            answers[currentQuestion] = value;
            document.getElementById('nextBtn').disabled = false;
            saveProgress();
        }
        
        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }
        
        function nextQuestion() {
            if (currentQuestion < totalQuestions - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                showResult();
            }
        }
        
        function showResult() {
            document.getElementById('questionContainer').classList.add('hidden');
            document.getElementById('resultContainer').style.display = 'block';
            localStorage.removeItem('xunmengge_green_progress');
            
            const categories = {};
            questions.forEach((q, i) => {
                if (!categories[q.category]) categories[q.category] = [];
                categories[q.category].push(answers[i] || 3);
            });
            
            let html = '';
            for (const [cat, scores] of Object.entries(categories)) {
                const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
                const percent = Math.round((avg - 1) / 4 * 100);
                const info = (quizData.resultPage?.scores || {})[cat] || {name: cat, desc: ''};
                html += '<div class="score-card"><div class="score-item"><span>' + info.name + '</span><span>' + percent + '%</span></div><div class="score-bar"><div class="score-fill" style="width:' + percent + '%"></div></div><p style="font-size:0.85em;color:#888;margin-top:10px">' + info.desc + '</p></div>';
            }
            
            document.getElementById('scoreCards').innerHTML = html;
        }
        
        init();
    </script>
</body>
</html>
